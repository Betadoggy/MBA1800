<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBA 1800</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white text-slate-900 max-w-md mx-auto p-4 font-sans">

    <div class="flex items-center justify-between text-xs text-slate-500 mb-4 border-b pb-2">
        <div class="flex items-center gap-2">
            <span>{{.Category}} · {{.ID}}</span>
            <button id="bookmarkBtn" onclick="toggleBookmark()" class="text-sm focus:outline-none transition-transform active:scale-125">
                {{if .IsBookmarked}}<span class="text-yellow-400">★</span>{{else}}<span class="text-slate-300">☆</span>{{end}}
            </button>
        </div>
        <form action="/" method="GET" class="flex items-center gap-1">
            <input type="number" name="id" placeholder="ID 입력" required
                   class="w-24 border rounded px-1.5 py-0.5 text-center text-slate-800 focus:outline-none focus:border-slate-400 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
            <button type="submit" class="bg-slate-100 hover:bg-slate-200 border text-slate-600 px-2 py-0.5 rounded font-medium">이동</button>
        </form>
    </div>

    <h2 class="text-base font-semibold leading-snug mb-4">{{.Question}}</h2>

    {{if .BoxContent}}
    <div class="bg-slate-50 border p-3 text-xs text-slate-600 whitespace-pre-wrap mb-4 font-mono">{{.BoxContent}}</div>
    {{end}}

    {{if .TableContent}}
    <div class="overflow-x-auto text-xs border rounded mb-4 p-1">{{.TableContent}}</div>
    {{end}}

    {{if .HasImage}}
    <img src="/{{.ImageURL}}" class="w-full h-auto border rounded mb-4">
    {{end}}

    <div class="space-y-2" id="options">
        {{range $key, $value := .Options}}
            {{if $value}}
            <button onclick="submit('{{$key}}')"
                class="w-full text-left p-3 border rounded text-sm hover:bg-slate-50 active:bg-slate-100 flex gap-2">
                <span class="font-bold text-slate-400">{{$key}}.</span>
                <span>{{$value}}</span>
            </button>
            {{end}}
        {{end}}
    </div>

    <div id="result" class="hidden mt-6 pt-4 border-t">
        <div id="status" class="text-base font-bold mb-2"></div>
        <div class="bg-slate-50 p-3 rounded text-xs text-slate-600 leading-relaxed whitespace-pre-wrap mb-4"><span class="block font-bold text-slate-400 mb-1">【 해설 】</span><span id="explanation"></span></div>
        <button onclick="location.reload()" class="w-full py-2.5 bg-slate-900 text-white font-medium text-sm rounded">
            다음 문제
        </button>
    </div>

    <script>
        const start = Date.now();
        let submitted = false;
        let isBookmarked = {{.IsBookmarked}};

        function toggleBookmark() {
            const nextState = !isBookmarked;
            fetch('/api/bookmark', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    problem_id: {{.ID}},
                    bookmark: nextState
                })
            })
            .then(res => {
                if (res.ok) {
                    isBookmarked = nextState;
                    const btn = document.getElementById('bookmarkBtn');
                    btn.innerHTML = isBookmarked ? '<span class="text-yellow-400">★</span>' : '<span class="text-slate-300">☆</span>';
                }
            });
        }

        function submit(option) {
            if (submitted) return; // 중복 제출 방지
            submitted = true;

            const elapsed = Math.floor((Date.now() - start) / 1000);

            fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    user_id: 1,
                    problem_id: {{.ID}},
                    selected_option: parseInt(option),
                    time_spent: elapsed
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('options').classList.add('opacity-50');

                const status = document.getElementById('status');
                if (data.is_correct) {
                    status.innerText = "✓ 정답입니다.";
                    status.className = "text-sm font-bold text-blue-600 mb-2";
                } else {
                    status.innerText = `✗ 틀렸습니다. (정답: ${data.answer}번)`;
                    status.className = "text-sm font-bold text-red-600 mb-2";
                }

                document.getElementById('explanation').innerText = data.explanation;
                document.getElementById('result').classList.remove('hidden');
                document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
            });
        }
    </script>
</body>

</html>
