<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자주 틀린 문제</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-slate-900 max-w-md mx-auto p-4 font-sans">
    <div class="mb-4 flex items-center justify-between">
        <div>
            <h1 class="text-lg font-semibold">자주 틀린 문제</h1>
        </div>
        <a href="/weaknesses" class="rounded bg-slate-900 px-3 py-2 text-sm font-medium text-white">돌아가기</a>
    </div>

    <div class="space-y-2">
        {{range .Problems}}
        <a href="/?id={{.ID}}" class="block rounded-lg border border-slate-200 p-3 transition hover:bg-slate-50">
            <div class="text-sm font-medium text-slate-700">{{.Question}}</div>
            <div class="mt-1 text-xs text-slate-500">{{.Category}} · 문제 ID {{.ID}}</div>
            <div class="mt-3 text-right text-base font-bold text-amber-600">{{.WrongCount}}회 틀림</div>
        </a>
        {{else}}
        <div class="rounded-lg border border-dashed border-slate-300 p-4 text-sm text-slate-500">아직 틀린 문제가 없습니다.</div>
        {{end}}
    </div>
</body>
</html>
